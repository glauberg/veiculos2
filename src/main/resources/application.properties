# ================================
# BASE A - Dados Principais
# ================================
spring.datasource.primary.url=jdbc:h2:mem:baseA;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.primary.driver-class-name=org.h2.Driver
spring.datasource.primary.username=sa
spring.datasource.primary.password=

# ================================
# BASE B - Auditoria/Log
# ================================
spring.datasource.audit.url=jdbc:h2:mem:baseB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.audit.driver-class-name=org.h2.Driver
spring.datasource.audit.username=sa
spring.datasource.audit.password=

# ================================
# JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ================================
# H2 Console (debug)
# ================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ================================
# Aplicacao
# ================================
spring.application.name=veiculos2
server.port=8080
